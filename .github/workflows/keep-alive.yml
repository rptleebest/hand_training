name: Wake Up Streamlit App

on:
  schedule:
    # 4시간마다 실행, UTC 기준
    # 한국시간 기준 대략 02:17, 06:17, 10:17, 14:17, 18:17, 22:17
    - cron: "17 */4 * * *"
  workflow_dispatch:

jobs:
  wake-up:
    runs-on: ubuntu-latest

    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install chromium

      - name: Wake Streamlit App
        run: |
          python - <<'PY'
          import re
          import time
          from playwright.sync_api import sync_playwright, TimeoutError as PlaywrightTimeoutError

          APP_URL = "https://handtraining.streamlit.app"

          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              page = browser.new_page(
                  viewport={"width": 1280, "height": 900},
                  user_agent=(
                      "Mozilla/5.0 (X11; Linux x86_64) "
                      "AppleWebKit/537.36 (KHTML, like Gecko) "
                      "Chrome/120.0.0.0 Safari/537.36"
                  ),
              )

              print(f"Streamlit 앱 접속 중: {APP_URL}")

              try:
                  page.goto(APP_URL, timeout=120000, wait_until="domcontentloaded")
              except Exception as e:
                  print("초기 접속 중 경고:", e)

              # Streamlit 절전 화면이 뜨면 깨우기 버튼 클릭
              wake_button_patterns = [
                  re.compile("yes, get this app back up", re.I),
                  re.compile("get this app back up", re.I),
                  re.compile("wake", re.I),
              ]

              clicked = False
              for pattern in wake_button_patterns:
                  try:
                      button = page.get_by_role("button", name=pattern)
                      if button.count() > 0:
                          print("절전 모드 감지: 깨우기 버튼 클릭")
                          button.first.click()
                          clicked = True
                          time.sleep(45)
                          break
                  except Exception:
                      pass

              if not clicked:
                  print("절전 모드 버튼은 보이지 않음. 앱 로딩 확인으로 진행합니다.")

              # 현재 손 기능 재활 앱에서 확인할 수 있는 실제 문구
              app_markers = [
                  "손 기능 재활",
                  "카메라만 켜기",
                  "훈련 시작",
                  "손가락 동작 보정",
              ]

              loaded = False
              for marker in app_markers:
                  try:
                      page.wait_for_selector(f"text={marker}", timeout=45000)
                      print(f"앱 활성화 확인: '{marker}' 텍스트 감지")
                      loaded = True
                      break
                  except PlaywrightTimeoutError:
                      continue

              if not loaded:
                  print("경고: 앱 UI 텍스트를 확인하지 못했습니다.")
                  print("현재 페이지 제목:", page.title())
                  print("현재 URL:", page.url)
              else:
                  print("앱이 정상적으로 활성화되었습니다.")
                  time.sleep(20)

              browser.close()
          PY
